name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: write
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPILERCHECK: content
      CCACHE_MAXSIZE: 400M
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: js/package.json

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm --dir js install --frozen-lockfile

      - name: Build JS (runtime + deck app)
        run: pnpm --dir js build

      - name: Typecheck JS
        run: pnpm --dir js tsc

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-host-${{ hashFiles('CMakeLists.txt', 'src/**', 'vendor/quickjs/**') }}
          restore-keys: |
            ccache-${{ runner.os }}-host-

      - name: Cache Homebrew downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/Homebrew
            ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            brew-${{ runner.os }}-

      - name: Install host native dependencies
        run: brew install raylib pkgconf cmake ccache

      - name: Configure and build host target
        run: |
          CCACHE="$(brew --prefix ccache)/bin/ccache"
          if [[ ! -x "$CCACHE" ]]; then
            echo "ccache not found at $CCACHE" >&2
            exit 1
          fi
          cmake -S . -B out \
            -DCMAKE_C_COMPILER_LAUNCHER="$CCACHE" \
            -DCMAKE_CXX_COMPILER_LAUNCHER="$CCACHE"
          cmake --build out --parallel "$(sysctl -n hw.logicalcpu)"

      - name: ccache stats
        if: success()
        run: '"$(brew --prefix ccache)/bin/ccache" -s'

      - name: Tests
        run: ctest --test-dir out --output-on-failure
