name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: write
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPILERCHECK: content
      CCACHE_MAXSIZE: 400M
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: js/package.json

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm --dir js install --frozen-lockfile

      - name: Build JS (runtime + deck app)
        run: pnpm --dir js build

      - name: Typecheck JS
        run: pnpm --dir js tsc

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-host-${{ hashFiles('CMakeLists.txt', 'src/**', 'vendor/quickjs/**') }}
          restore-keys: |
            ccache-${{ runner.os }}-host-

      - name: Cache Homebrew downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/Homebrew
            ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            brew-${{ runner.os }}-

      - name: Install host native dependencies
        run: brew install raylib pkgconf cmake ccache

      - name: Configure and build host target
        run: |
          CCACHE="$(brew --prefix ccache)/bin/ccache"
          if [[ ! -x "$CCACHE" ]]; then
            echo "ccache not found at $CCACHE" >&2
            exit 1
          fi
          cmake -S . -B out \
            -DCMAKE_C_COMPILER_LAUNCHER="$CCACHE" \
            -DCMAKE_CXX_COMPILER_LAUNCHER="$CCACHE"
          cmake --build out --parallel "$(sysctl -n hw.logicalcpu)"

      - name: ccache stats
        if: success()
        run: '"$(brew --prefix ccache)/bin/ccache" -s'

      - name: Tests
        # Visual smoke runs in the Linux `smoke` job — see docs/adr/0002-smoke-ci-linux-xvfb.md
        run: ctest --test-dir out --output-on-failure -E smoke_harness

  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: js/package.json

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm --dir js install --frozen-lockfile

      - name: Build JS (runtime + deck app)
        run: pnpm --dir js build

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config xvfb \
            libcurl4-openssl-dev libssl-dev zlib1g-dev \
            libgl-dev libegl-dev libx11-dev libxext-dev libxrandr-dev \
            libxcursor-dev libxi-dev libxinerama-dev libxxf86vm-dev

      - name: Install raylib
        run: |
          if pkg-config --exists raylib; then
            echo "raylib already installed: $(pkg-config --modversion raylib)"
            exit 0
          fi
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git /tmp/raylib
          cmake -S /tmp/raylib -B /tmp/raylib/build -DBUILD_SHARED_LIBS=ON
          cmake --build /tmp/raylib/build --parallel "$(nproc)"
          sudo cmake --install /tmp/raylib/build
          sudo ldconfig

      - name: Configure and build host target
        run: |
          CC=gcc CXX=g++ cmake -S . -B out -DCMAKE_EXE_LINKER_FLAGS="-Wl,--start-group"
          cmake --build out --parallel "$(nproc)"

      - name: Smoke test
        # macOS cannot initialize NSGL for raylib on GitHub runners — see docs/adr/0002-smoke-ci-linux-xvfb.md
        run: xvfb-run -a ctest --test-dir out --output-on-failure -R smoke_harness

      - name: Upload smoke screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshot
          path: out/smoke_screenshot.png
          if-no-files-found: ignore
