name: Vita (VPK)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vita-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vpk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPILERCHECK: content
      CCACHE_MAXSIZE: 500M
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: js/package.json

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm --dir js install --frozen-lockfile

      - name: Build JS (required before Vita CMake; stages js/dist)
        run: pnpm --dir js build

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-vita-${{ hashFiles('CMakeLists.txt', 'src/**', 'vendor/quickjs/**') }}
          restore-keys: |
            ccache-${{ runner.os }}-vita-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build vitasdk image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: vitadeck-vitasdk:ci
          cache-from: type=gha,scope=vitadeck-vitasdk
          cache-to: type=gha,mode=max,scope=vitadeck-vitasdk

      - name: Build Vita target in Vitasdk container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/build/git" \
            -w /build/git \
            -e CCACHE_DIR=/build/git/.ccache \
            -e CCACHE_COMPILERCHECK=content \
            -e CCACHE_MAXSIZE=500M \
            vitadeck-vitasdk:ci \
            bash -lc 'cmake -S . -B out-vita \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache && \
              cmake --build out-vita --parallel "$(nproc)"'

      - name: ccache stats
        if: always()
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/build/git" \
            -w /build/git \
            -e CCACHE_DIR=/build/git/.ccache \
            vitadeck-vitasdk:ci \
            ccache -s

      - name: Upload VPK
        uses: actions/upload-artifact@v6
        with:
          name: vitadeck-vpk-${{ github.sha }}
          path: out-vita/vitadeck.vpk
